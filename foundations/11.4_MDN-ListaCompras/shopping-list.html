<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping list example</title>
    <style>
      li {
        margin-bottom: 10px;
      }

      li button {
        font-size: 12px;
        margin-left: 20px;
        color: #666;
      }
    </style>
  </head>
  <body>

    <h1>My shopping list</h1>

    <form>
      <label for="item">Enter a new item:</label>
      <input type="text" name="item" id="item">
      <button>Add item</button>
    </form>

    <ul>

    </ul>

    <script>
      let lista = document.querySelector("ul");
      let input = document.querySelector("#item");
      const botao = document.querySelector("button");

      botao.addEventListener("click", (evento) => {

        /* evita o comportamento padrão do botão (enviar o input
        para o formulário), recarregando a página: */
        evento.preventDefault(); 

        let inputRecebido = input.value;

        let itemLista = document.createElement("li");
        let span = document.createElement("span");
        const botaoDelete = document.createElement("button");

        itemLista.appendChild(span);
        itemLista.appendChild(botaoDelete);

        span.textContent = inputRecebido;
        
        botaoDelete.textContent = "Delete";
        
        lista.appendChild(itemLista);

        inputRecebido = "";
      });
    </script>
  </body>
</html>
